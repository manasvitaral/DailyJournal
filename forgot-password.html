<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="logo_img/main_logo.png" type="image/png">
  <title>Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page login-bg">

<div class="auth-container">

  <!-- STEP 1: EMAIL -->
  <form id="forgotForm" class="login-container">
    <h2>Reset Password</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <button class="btn-primary">Send OTP</button>

    <p class="login-text">
      <a href="login.html">Back to Login</a>
    </p>
  </form>

  <!-- STEP 2: OTP (HIDDEN INITIALLY) -->
  <form id="otpForm" class="login-container" style="display:none;">
    <h2>Enter OTP</h2>

    <div class="form-group">
      <label>OTP</label>
      <input type="text" id="otp" required>
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" required>
    </div>

    <button class="btn-primary">Reset Password</button>
  </form>

</div>

<script src = "logic.js"></script>

</body>
</html>
