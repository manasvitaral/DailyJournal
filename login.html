<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Daily Journal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="auth-container">

    <!-- LEFT SIDE ->
    <div class="auth-left login-bg">
      <!- <div class="auth-content">
        <h2>Welcome Back</h2>
        <p>
          Access your journal, track entries, and continue your streak.
        </p>
      </div> -->

      <div class="auth-left">
        <img src="logo_img/login.jpeg" alt="Login Image">
      </div>
      
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">

      <div class="login-container">
        <h2>Login</h2>

        <!-- FORM CONNECTED TO DATABASE -->
        <form id="loginForm">

          <!-- EMAIL (users.email) -->
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input 
              type="email" 
              id="loginEmail" 
              name="email"
              placeholder="Enter your email"
              required
            >
          </div>

          <!-- PASSWORD (users.password) -->
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input 
              type="password" 
              id="loginPassword" 
              name="password"
              placeholder="Enter your password"
              required
            >
          </div>

          <!-- SUBMIT -->
          <button type="submit" class="btn-primary btn-block">
            Login
          </button>

          <!-- EXTRA FEATURES (based on your tables) -->
          <div class="extra-links">

            <!-- password_resets table -->
            <p class="signup-text">
              <a href="forgot-password.html">Forgot Password?</a>
            </p>

            <!-- signup -->
            <p class="signup-text">
              No account? <a href="signup.html">Create Account</a>
            </p>

          </div>

        </form>
      </div>

    </div>

  </div>

  <script src="logic.js"></script>

</body>
</html>
