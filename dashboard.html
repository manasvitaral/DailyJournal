<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

  <nav class="dashboard-nav">
    <h1>Daily Journal</h1>
    
    <div class="nav-right">

      <!--<button onclick="goToInsights()" class="insights-btn">📊 Insights</button>-->
      <button onclick="goToInsights()" class="insights-btn">
        <img src="logo_img/insights.png" class="icon">
        <span>Insights</span>
      </button>
      
      <!-- USER INFO (optional: name beside avatar) -->
      <span id="userName">Loading...</span>

      <!-- AVATAR DROPDOWN -->
      <div class="avatar-wrapper">
        <img id="navProfilePic" src="https://via.placeholder.com/40" class="nav-profile-pic">

        <div class="dropdown-menu" id="dropdownMenu">
          <button onclick="goToProfile()">👤 Profile</button>
          <button id="logoutBtn">🚪 Logout</button>
        </div>
      </div>

      <!--
      <button onclick="goToInsights()" class="insights-btn">📊 Insights</button>
    -->

    </div>
  </nav>
  
  <!-- MAIN -->
  <div class="dashboard-container">

    <!--<h2 id="greetingText">Welcome 👋</h2>-->
    <h2 id="greetingText" class="greeting">
      <span>Welcome</span>
      <img src="logo_img/welcome.png" class="icon greeting-icon">
    </h2>

    <div class="dashboard-cards">

      <div class="top-cards">
        <div class="card">
          <h3>Today's Entry</h3>
          <p>Write your journal for today</p>
          <button class="btn-primary" onclick="window.location.href='entry.html'">Open</button>
        </div>

        <div class="card">
          <h3>Your Streak</h3>
          <p id="streakText">Loading...</p>
        </div>
      </div>

      <div class="calendar-card">
        <div class="calendar-header">
          <button id="prevMonth">◀</button>
          <h3 id="calendarMonth"></h3>
          <button id="nextMonth">▶</button>
        </div>

  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="insights-card" onclick="goToInsights()">
  <!--<h3>📊 View Insights</h3>-->
  <h3 class="card-title">
    <img src="logo_img/insights.png" class="icon">
    <span>View Insights</span>
  </h3>
  <p>Track your mood, sleep, and habits over time</p>
</div>
